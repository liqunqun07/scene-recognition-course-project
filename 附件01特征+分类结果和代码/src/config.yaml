# 自定义数据集配置 (用户可以修改)
custom:
  categories:
    - 'class1'
    - 'class2'
    # 添加更多类别...
  
  abbr_categories:
    - 'c1'
    - 'c2'
    # 添加对应的缩写...

# 特征提取配置
features:
  # Tiny Image配置
  tiny_image:
    size: 16  # 16x16像素
  
  # Bag of Words配置
  bag_of_words:
    vocab_size: 200
    hog_pixels_per_cell: [4, 4]
    hog_cells_per_block: [2, 2]
  
  # CNN配置
  cnn:
    # 默认模型 (resnet18, resnet50, vgg16)
    default_model: 'resnet50'
    batch_size: 32
    use_gpu: true

# 分类器配置
classifiers:
  # 最近邻分类器
  nearest_neighbor:
    k: 1  # K值
  
  # SVM分类器
  svm:
    kernel: 'linear'
    C: 1.0

# 结果保存配置
results:
  save_path: './results/'
  create_webpage: true
  save_predictions: true
  save_config: true
