# 场景识别项目配置文件
# Scene Recognition Project Configuration File
#关闭了图像预处理

# 数据集配置
dataset:
  # 数据集名称 (可选: '15scene', '67indoor', 'custom')
  name: '15scene'
  
  # 每个类别的最大训练样本数
  num_train_per_cat: 200
  
  # 图像预处理设置
  preprocessing:
    # 是否启用预处理
    enabled: true #false
    # 预处理后保存路径
    output_path: './preprocessed_data/'
    # 目标图像格式 (jpg, png)
    target_format: 'jpg'
    # 是否调整大小 (null表示不调整)
    resize: [256, 256] #null
    # 是否转换为RGB (对于灰度图)
    convert_to_rgb: true
    # 是否保留原始文件结构
    keep_structure: true

# 数据集路径映射 - 根据数据集名称自动选择路径
dataset_paths:
  # 修改为本机数据集路径；也可使用环境变量，例如 ${SCENE15_DATA_PATH}
  '15scene': './data/15scene'
  '67indoor': './data/67indoor'

